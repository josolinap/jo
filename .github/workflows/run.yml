name: Run Jo Bot

# Allow current run to finish (saves cache) before new run starts
# Jo's self-restart triggers new run, but old run completes first
# cancel-in-progress: false ensures old run finishes and saves cache
concurrency:
  group: jo-bot
  cancel-in-progress: false

# Opt into Node.js 24 (Node.js 20 deprecated)
env:
  HOME: /home/runner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

# Permissions for git push operations (Jo creates tags/commits) and run cleanup
permissions:
  contents: write
  actions: write

on:
  # Trigger on push to dev (Jo's working branch)
  push:
    branches:
      - dev
  # Run every 2 hours as safety net (replaces 6h for faster recovery)
  schedule:
    - cron: "0 */2 * * *"
  # Manual trigger from GitHub UI
  workflow_dispatch: {}
  # API trigger (can be called from external services like Telegram)
  repository_dispatch:
    types: [restart]

jobs:
  # Check if we should run (skip if Jo itself pushed the commit)
  should-run:
    name: Check if workflow should run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if we should run
        id: check
        run: |
          # Skip only on push events from Jo (not on repository_dispatch self-restart)
          # This prevents workflow from interrupting itself when Jo commits code
          if [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.actor }}" == "Ouroboros" ]]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⚠️ Skipping: Jo's own commit (push event), prevents workflow interrupting itself"
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ Will run: event=${{ github.event_name }}, actor=${{ github.actor }}"
          fi

  run-bot:
    name: Jo Telegram Bot
    needs: should-run
    if: needs.should-run.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout the latest code
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'push' && github.sha || github.ref }}

      # -----------------------------------------------------------------------
      # 2. Set up Python with pip caching (public repo optimization)
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # -----------------------------------------------------------------------
      # 2.1 Cache Playwright browsers (public repo optimization)
      # -----------------------------------------------------------------------
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: /tmp/ms-playwright
          key: playwright-${{ runner.os }}-v1
          restore-keys: |
            playwright-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # 3. Install dependencies (quiet mode for faster CI logs)
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install python-dotenv>=1.1.1 --quiet
          pip install -r requirements.txt --quiet

      # -----------------------------------------------------------------------
      # 3.1 VALIDATE CODE BEFORE RUNNING BOT
      # Fail fast if syntax errors or import failures exist
      # -----------------------------------------------------------------------
      - name: Validate Python syntax
        run: |
          echo "=== Syntax validation ==="
          python -m py_compile ouroboros/*.py && echo "✓ ouroboros/*.py OK" || { echo "✗ Syntax errors in ouroboros/*.py"; exit 1; }
          python -m py_compile ouroboros/tools/*.py && echo "✓ ouroboros/tools/*.py OK" || { echo "✗ Syntax errors in ouroboros/tools/*.py"; exit 1; }
          python -m py_compile supervisor/*.py && echo "✓ supervisor/*.py OK" || { echo "✗ Syntax errors in supervisor/*.py"; exit 1; }
          echo "=== All syntax checks passed ==="

      - name: Validate critical imports
        run: |
          echo "=== Import validation ==="
          python -c "from ouroboros.tools.registry import ToolRegistry; print('✓ ToolRegistry OK')" || { echo "✗ ToolRegistry import failed"; exit 1; }
          python -c "from ouroboros.vault_manager import VaultManager; print('✓ VaultManager OK')" || { echo "✗ VaultManager import failed"; exit 1; }
          python -c "from supervisor.state import init; print('✓ supervisor.state OK')" || { echo "✗ supervisor.state import failed"; exit 1; }
          echo "=== All imports passed ==="

      - name: Run smoke tests
        run: |
          echo "=== Running smoke tests ==="
          python -m pytest tests/test_smoke.py -v --tb=short || { echo "✗ Smoke tests failed"; exit 1; }
          echo "=== Smoke tests passed ==="

      # -----------------------------------------------------------------------
      # 3.2 Validate pipeline features
      # Ensure our PIPELINE_PLAN.md features are properly configured
      # -----------------------------------------------------------------------
      - name: Validate pipeline features
        run: |
          echo "=== Pipeline feature validation ==="
          python -c "
          import os
          os.environ['REPO_DIR'] = '.'
          from ouroboros.loop import (
              USE_CONTEXT_ENRICHMENT, USE_CODE_NORMALIZATION,
              USE_SEMANTIC_SYNTHESIS, USE_TASK_EVALUATION,
              USE_STRUCTURED_PIPELINE, USE_TASK_GRAPH
          )
          print(f'Context Enrichment: {USE_CONTEXT_ENRICHMENT}')
          print(f'Code Normalization: {USE_CODE_NORMALIZATION}')
          print(f'Semantic Synthesis: {USE_SEMANTIC_SYNTHESIS}')
          print(f'Task Evaluation: {USE_TASK_EVALUATION}')
          print(f'Structured Pipeline: {USE_STRUCTURED_PIPELINE}')
          print(f'Task Graph: {USE_TASK_GRAPH}')
          print('✓ Pipeline features validated')
          " || { echo "✗ Pipeline validation failed"; exit 1; }

      - name: Validate pi prompts and skills
        run: |
          echo "=== Pi prompts validation ==="
          python -c "
          from ouroboros.pi_prompts import (
              get_pr_review_prompt, get_changelog_prompt,
              get_issue_prompt, get_audit_prompt,
              get_evolution_prompt, get_debug_prompt, get_security_prompt
          )
          from ouroboros.tools.skills import SKILLS

          prompts = {
              'pr': get_pr_review_prompt(),
              'changelog': get_changelog_prompt(),
              'issue': get_issue_prompt(),
              'audit': get_audit_prompt(),
              'evolution': get_evolution_prompt(),
              'debug': get_debug_prompt(),
              'security': get_security_prompt()
          }

          loaded = sum(1 for p in prompts.values() if p)
          print(f'Pi prompts loaded: {loaded}/7')

          pi_skills = ['github-review', 'changelog', 'issue-analyzer', 'evolution', 'debug', 'security']
          registered = sum(1 for s in pi_skills if s in SKILLS)
          print(f'Pi skills registered: {registered}/6')

          if loaded < 7:
              print(f'✗ Missing prompts: {[k for k, v in prompts.items() if not v]}')
              exit(1)
          if registered < 6:
              print(f'✗ Missing skills: {[s for s in pi_skills if s not in SKILLS]}')
              exit(1)

          print('✓ Pi prompts and skills validated')
          " || { echo "✗ Pi prompts validation failed"; exit 1; }

      # -----------------------------------------------------------------------
      # 4. Write a minimal .env from secrets so the app can read them
      #    (load_dotenv() reads this, but env vars below take precedence)
      # -----------------------------------------------------------------------
      - name: Write runtime config
        run: |
          cat > .env <<'EOF'
          # Generated by GitHub Actions — do not commit
          EOF

      # -----------------------------------------------------------------------
      # 5. Restore Jo data from cache (state, logs, memory)
      # NOTE: Uses stable key (branch name) so cache persists across runs.
      # Each new workflow run restores the SAME cache and saves back to it.
      # -----------------------------------------------------------------------
      - name: Restore Jo data
        uses: actions/cache@v4
        with:
          path: /home/runner/.jo_data
          key: jo-data-${{ github.ref_name }}
          restore-keys: |
            jo-data-

      # -----------------------------------------------------------------------
      # 5.1 Initialize vault structure if not exists
      # -----------------------------------------------------------------------
      - name: Initialize vault structure
        run: |
          JO_DATA="/home/runner/.jo_data"
          
          # Check what was restored from cache
          echo "=== Cache debug ==="
          echo "HOME=$HOME"
          echo "JO_DATA=$JO_DATA"
          if [ -d "$JO_DATA" ]; then
            echo "jo_data exists"
            ls -la "$JO_DATA/"
            if [ -d "$JO_DATA/vault" ]; then
              echo "vault exists"
              ls -laR "$JO_DATA/vault/"
            else
              echo "vault NOT found in cache"
            fi
          else
            echo "jo_data NOT found (fresh start)"
          fi
          echo "=== End cache debug ==="
          
          # Initialize runtime directories in ~/.jo_data/ (cache/runtime only)
          mkdir -p /home/runner/.jo_data/{cache,tmp,locks,task_results,index,archive}
          echo "Runtime directories ready (cache, tmp, locks, task_results, index, archive)"
          
          # Ensure vault/ exists in repo workspace (git-tracked, NOT in ~/.jo_data/)
          mkdir -p ${{ github.workspace }}/vault/{concepts,projects,tools,journal}
          echo "Vault structure ready (in repo, git-tracked)"

      # -----------------------------------------------------------------------
      # 5.2 Auto-register owner on startup
      # (Owner notification is handled by auto_resume_after_restart on launch)
      # -----------------------------------------------------------------------
      - name: Auto-register owner on startup
        env:
          TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_OWNER_CHAT_ID" ]; then
            echo "Owner auto-registered via TELEGRAM_OWNER_CHAT_ID: $TELEGRAM_OWNER_CHAT_ID"
          else
            echo "TELEGRAM_OWNER_CHAT_ID not set - owner will need to send first message"
          fi

      # -----------------------------------------------------------------------
      # 6. Run the bot for up to 5.5 hours (330 minutes)
      #    After that, the self-restart step fires and kicks off a fresh run.
      # -----------------------------------------------------------------------
      - name: Run Jo bot (max 5.5 hours)
        env:
          # --- Required secrets ---
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          TOTAL_BUDGET: ${{ secrets.TOTAL_BUDGET || '50' }}

          # --- Owner ID (needed for auto-resume notifications) ---
          TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}

          # --- NVIDIA NIM (free 40 req/min fallback) ---
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

          # --- Optional model overrides ---
          OUROBOROS_MODEL: ${{ secrets.OUROBOROS_MODEL || 'openrouter/free' }}
          OUROBOROS_MODEL_CODE: ${{ secrets.OUROBOROS_MODEL_CODE || 'openrouter/free' }}
          OUROBOROS_MODEL_LIGHT: ${{ secrets.OUROBOROS_MODEL_LIGHT || 'openrouter/free' }}

          # --- Behavior flags ---
          # Skip git-sync: the runner already has the code checked out
          OUROBOROS_NO_GIT_SYNC: "1"
          # Disable pre-push tests in CI (pytest runs separately)
          OUROBOROS_PRE_PUSH_TESTS: "0"
          # Suppress internal progress messages to owner (show only model responses)
          OUROBOROS_SUPPRESS_PROGRESS: "1"
          # Spice injection interval (every N rounds, default 5 for less aggressive)
          OUROBOROS_SPICE_INTERVAL: "5"
          # Persist data across runs via GitHub Actions cache
          DATA_ROOT: /home/runner/.jo_data
          REPO_DIR: ${{ github.workspace }}

          # --- New features (from Kong-inspired pipeline) ---
          # Normalize code before LLM processing (removes noise, reduces tokens)
          OUROBOROS_NORMALIZE_CODE: "1"
          # Pre-fetch relevant context before LLM calls
          OUROBOROS_ENRICH_CONTEXT: "1"
          # Enable vault search during context enrichment
          OUROBOROS_USE_VAULT_ENRICH: "1"
          # Max vault notes to include in context enrichment
          OUROBOROS_MAX_VAULT_NOTES: "3"
          # Max files to pre-fetch for context enrichment
          OUROBOROS_MAX_ENRICH_FILES: "10"
          # Run quality evaluation after task completion
          OUROBOROS_EVAL: "1"
          # Run semantic synthesis after task completion
          OUROBOROS_SYNTHESIS: "1"
          # Enable pipeline (diagnose, plan, execute, verify, synthesize)
          OUROBOROS_USE_PIPELINE: "1"
          # Background consciousness budget (30% for free models)
          OUROBOROS_BG_BUDGET_PCT: "30"
          # Enable health auto-fix (version sync, stale identity, uncommitted)
          AUTO_FIX_ENABLED: "0"

          # Playwright in headless server environment
          PLAYWRIGHT_BROWSERS_PATH: /tmp/ms-playwright

        run: |
          # Install Playwright browser binary (deps only needed on first run)
          if [ -d /tmp/ms-playwright ]; then
            echo "Playwright cache hit — skipping --with-deps (saves ~60s of apt-get)"
            python -m playwright install chromium 2>/dev/null || true
          else
            echo "No Playwright cache — installing with system deps"
            python -m playwright install chromium --with-deps 2>/dev/null || true
          fi

          # Configure git identity for tag/commit operations
          git config --global user.name "Jo"
          git config --global user.email "jo@jo.ai"

          # Run the bot with a 330-minute (5.5-hour) timeout.
          # 'timeout' returns exit code 124 on timeout — that's expected and OK.
          timeout 330m python scripts/colab_launcher.py || EXIT_CODE=$?
          EXIT_CODE=${EXIT_CODE:-0}

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "✅ Bot ran for 5.5 hours — time limit reached, self-restart will fire."
          elif [ "$EXIT_CODE" -eq 0 ]; then
            echo "ℹ️ Bot exited cleanly (code 0)."
          else
            echo "⚠️ Bot exited with code $EXIT_CODE."
            exit "$EXIT_CODE"
          fi

      # -----------------------------------------------------------------------
      # 6.1 Notify owner on failure (before cache save)
      # -----------------------------------------------------------------------
      - name: Notify owner on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_OWNER_CHAT_ID" ]; then
            echo "⚠️ Telegram secrets not set — skipping failure notification"
            exit 0
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="⚠️ *Jo Workflow Failed*

          *Run:* #${{ github.run_id }}
          *Branch:* \`${{ github.ref_name }}\`
          *Trigger:* ${{ github.event_name }}
          *Actor:* ${{ github.actor }}

          🔗 [View Logs]($RUN_URL)"

          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="$TELEGRAM_OWNER_CHAT_ID" \
            -d parse_mode="Markdown" \
            -d text="$MESSAGE" \
            || echo "⚠️ Failed to send Telegram notification"

      # -----------------------------------------------------------------------
      # 6. Save Jo data to cache (state, logs, memory)
      # Uses same stable key as restore so cache persists across runs
      # -----------------------------------------------------------------------
      - name: Save Jo data
        uses: actions/cache@v4
        with:
          path: /home/runner/.jo_data
          key: jo-data-${{ github.ref_name }}
          save-always: true

      # -----------------------------------------------------------------------
      # 6.2 Upload debug logs on failure (for troubleshooting)
      # -----------------------------------------------------------------------
      - name: Upload debug logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jo-debug-logs-${{ github.run_id }}
          path: |
            /home/runner/.jo_data/logs/
            /home/runner/.jo_data/state/
          retention-days: 7
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # 7. Self-restart: trigger a fresh workflow run so the bot stays alive.
      # Uses PAT_TOKEN stored as a secret (needs 'workflow' scope).
      # NOTE: Old run finishes and saves cache first (no cancel-in-progress).
      # Includes retry logic to handle transient API failures.
      # -----------------------------------------------------------------------
      - name: Self-restart — trigger next run
        if: success() || failure()
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: dev
        run: |
          if [ -z "$PAT_TOKEN" ]; then
            echo "⚠️ PAT_TOKEN not set — cron will handle restarts every 2 hours."
            exit 0
          fi

          echo "🔄 Triggering next workflow run..."

          # Retry up to 3 times to handle transient API failures
          for ATTEMPT in 1 2 3; do
            HTTP_STATUS=$(curl -s -o /tmp/gh_api_response.txt -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $PAT_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/actions/workflows/run.yml/dispatches" \
              -d "{\"ref\":\"$BRANCH\"}")

            if [ "$HTTP_STATUS" -eq 204 ]; then
              echo "✅ Next run triggered successfully (attempt $ATTEMPT)."
              exit 0
            fi

            echo "⚠️ Attempt $ATTEMPT failed: HTTP $HTTP_STATUS"
            if [ "$ATTEMPT" -lt 3 ]; then
              echo "Retrying in 5 seconds..."
              sleep 5
            fi
          done

          echo "❌ All retry attempts failed. Last response:"
          cat /tmp/gh_api_response.txt

          # Notify owner that self-restart failed
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_OWNER_CHAT_ID }}" ]; then
            curl -s "https://api.github.com/repos/$REPO/actions/workflows/run.yml/dispatches" \
              -d chat_id="${{ secrets.TELEGRAM_OWNER_CHAT_ID }}" \
              -d parse_mode="Markdown" \
              -d text="⚠️ *Jo Self-Restart Failed*\n\nWorkflow may not auto-restart. Cron will kick in within 2 hours." \
              || true
          fi

      # -----------------------------------------------------------------------
      # 8. Cleanup: Delete old completed workflow runs (keep non-scheduled last 5)
      # -----------------------------------------------------------------------
      - name: Cleanup old workflow runs
        if: success() || failure()
        timeout-minutes: 10
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          KEEP_RUNS: 5
          MAX_DELETE: 100
        run: |
          echo "🧹 Cleaning up old workflow runs..."
          echo "   Keeping the most recent $KEEP_RUNS completed non-scheduled runs"
          echo "   ALL scheduled runs are kept."

          WORKFLOW_NAME="${{ github.workflow }}"
          
          # Get COMPLETED runs for this workflow
          ALL_RUNS=$(gh run list \
            --workflow "$WORKFLOW_NAME" \
            --status completed \
            --limit 1000 \
            --json databaseId,event \
            --repo $GITHUB_REPOSITORY)

          if [ -z "$ALL_RUNS" ] || [ "$ALL_RUNS" = "[]" ]; then
            echo "ℹ️ No completed runs found."
            exit 0
          fi

          # Select non-scheduled runs only
          # jq filters out "schedule" events and keeps manual/push runs
          NON_SCHEDULED_RUNS=$(echo "$ALL_RUNS" | jq -c '.[] | select(.event != "schedule")')
          TOTAL_NON_SCHEDULED=$(echo "$NON_SCHEDULED_RUNS" | jq -s length)
          
          echo "   Total non-scheduled completed runs: $TOTAL_NON_SCHEDULED"

          if [ "$TOTAL_NON_SCHEDULED" -le "$KEEP_RUNS" ]; then
            echo "ℹ️ Only $TOTAL_NON_SCHEDULED non-scheduled runs found, keeping all."
            exit 0
          fi

          # Get runs to delete (skipping the first $KEEP_RUNS), capped at MAX_DELETE
          RUNS_TO_DELETE=$(echo "$NON_SCHEDULED_RUNS" | jq -s -r ".[$KEEP_RUNS:][].databaseId" | head -n "$MAX_DELETE")

          if [ -z "$RUNS_TO_DELETE" ]; then
            echo "ℹ️ No old runs to delete."
            exit 0
          fi

          DELETE_COUNT=$(echo "$RUNS_TO_DELETE" | wc -l)
          echo "   Deleting up to $DELETE_COUNT old runs..."

          DELETED=0
          FAILED=0
          for run_id in $RUNS_TO_DELETE; do
            if [ -n "$run_id" ]; then
              if gh run delete "$run_id" --repo $GITHUB_REPOSITORY 2>/dev/null; then
                DELETED=$((DELETED + 1))
              else
                FAILED=$((FAILED + 1))
              fi
            fi
          done

          echo "✅ Cleanup complete: deleted $DELETED runs, $FAILED failed"
