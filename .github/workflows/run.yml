name: Run Jo Bot

# Prevent multiple instances - cancel in-progress runs
concurrency:
  group: jo-bot
  cancel-in-progress: true

# Opt into Node.js 24 (Node.js 20 deprecated)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Trigger on push to dev (Jo's working branch)
  push:
    branches:
      - dev
  # Run every 2 hours as safety net (replaces 6h for faster recovery)
  schedule:
    - cron: "0 */2 * * *"
  # Manual trigger from GitHub UI
  workflow_dispatch: {}
  # API trigger (can be called from external services like Telegram)
  repository_dispatch:
    types: [restart]

jobs:
  run-bot:
    name: Jo Telegram Bot
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub's hard 6-hour cap — never exceed this

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout the latest code
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # -----------------------------------------------------------------------
      # 3. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install python-dotenv
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 4. Write a minimal .env from secrets so the app can read them
      #    (load_dotenv() reads this, but env vars below take precedence)
      # -----------------------------------------------------------------------
      - name: Write runtime config
        run: |
          cat > .env <<'EOF'
          # Generated by GitHub Actions — do not commit
          EOF

      # -----------------------------------------------------------------------
      # 5. Run the bot for up to 5.5 hours (330 minutes)
      #    After that, the self-restart step fires and kicks off a fresh run.
      # -----------------------------------------------------------------------
      - name: Run Jo bot (max 5.5 hours)
        env:
          # --- Required secrets ---
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          TOTAL_BUDGET: ${{ secrets.TOTAL_BUDGET || '50' }}

          # --- Optional model overrides ---
          OUROBOROS_MODEL: ${{ secrets.OUROBOROS_MODEL || 'openrouter/free' }}
          OUROBOROS_MODEL_CODE: ${{ secrets.OUROBOROS_MODEL_CODE || 'openrouter/free' }}
          OUROBOROS_MODEL_LIGHT: ${{ secrets.OUROBOROS_MODEL_LIGHT || 'openrouter/free' }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}

          # --- Behavior flags ---
          # Skip git-sync: the runner already has the code checked out
          OUROBOROS_NO_GIT_SYNC: "1"
          # Keep logs/state in a temp dir (ephemeral — resets each run)
          DATA_ROOT: /tmp/jo_data
          REPO_DIR: ${{ github.workspace }}

          # Playwright in headless server environment
          PLAYWRIGHT_BROWSERS_PATH: /tmp/ms-playwright

        run: |
          # Install Playwright browsers (needed by some tools, skipped if unused)
          python -m playwright install chromium --with-deps 2>/dev/null || true

          # Run the bot with a 330-minute (5.5-hour) timeout.
          # 'timeout' returns exit code 124 on timeout — that's expected and OK.
          timeout 330m python colab_launcher.py || EXIT_CODE=$?
          EXIT_CODE=${EXIT_CODE:-0}

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "✅ Bot ran for 5.5 hours — time limit reached, self-restart will fire."
          elif [ "$EXIT_CODE" -eq 0 ]; then
            echo "ℹ️ Bot exited cleanly (code 0)."
          else
            echo "⚠️ Bot exited with code $EXIT_CODE."
          fi

      # -----------------------------------------------------------------------
      # 6. Self-restart: trigger a fresh workflow run so the bot stays alive.
      #    Uses PAT_TOKEN (needs 'workflow' scope) stored as a secret.
      #    If PAT_TOKEN is not set, the scheduled cron will restart within 2 hours.
      # -----------------------------------------------------------------------
      - name: Self-restart — trigger next run
        if: always()
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
          # Use dev branch for all triggers (push, schedule, manual, API)
          BRANCH: dev
        run: |
          if [ -z "$PAT_TOKEN" ]; then
            echo "⚠️ PAT_TOKEN secret not set — skipping self-restart. The scheduled cron will restart the bot within 2 hours."
            exit 0
          fi

          echo "🔄 Triggering next workflow run..."
          HTTP_STATUS=$(curl -s -o /tmp/gh_api_response.txt -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAT_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/actions/workflows/run.yml/dispatches" \
            -d "{\"ref\":\"$BRANCH\"}")

          if [ "$HTTP_STATUS" -eq 204 ]; then
            echo "✅ Next run triggered successfully."
          else
            echo "⚠️ Trigger returned HTTP $HTTP_STATUS:"
            cat /tmp/gh_api_response.txt
            echo ""
            echo "The scheduled cron (every 6 hours) will restart the bot automatically."
          fi
