name: Cleanup Old Workflow Runs

on:
  # Run after the main workflow completes
  workflow_run:
    workflows: ["Run Jo Bot"]
    types: [completed]

jobs:
  cleanup:
    # Run on any workflow completion (success, cancelled, or failure)
    # We want to clean up regardless of how the workflow ended
    if: github.event.workflow_run.conclusion != 'in_progress'
    runs-on: ubuntu-latest
    steps:
      - name: Delete old completed runs
        run: |
          echo "Cleaning up old workflow runs..."

          # Get all completed runs, keep last 20
          RUN_IDS=$(gh run list --status completed --limit 100 --json databaseId | \
            jq -r '.[20:][].databaseId')

          if [ -z "$RUN_IDS" ]; then
            echo "No old runs to delete."
            exit 0
          fi

          COUNT=$(echo "$RUN_IDS" | grep -c . || echo "0")
          echo "Deleting $COUNT old completed runs (keeping last 20)..."

          # Delete each run
          for run_id in $RUN_IDS; do
            if [ -n "$run_id" ]; then
              gh run delete "$run_id" 2>/dev/null || true
            fi
          done

          echo "Cleanup complete."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
