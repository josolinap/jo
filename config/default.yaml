# Jo Configuration - Default Values
# This file contains default configuration that can be overridden in overrides.yaml

llm:
  default_model: "openrouter/free"
  temperature: 0.3
  max_tokens: 8192
  reasoning_effort: "medium"
  # Fallback chain: models to try when primary fails (ordered by priority)
  # Priority 1: OUROBOROS_MODEL env var (GitHub secret)
  # Priority 2: OUROBOROS_MODEL_LIGHT env var
  # Priority 3: OUROBOROS_MODEL_CODE env var
  # Priority 4: This config fallback_chain
  # Priority 5: Hardcoded openrouter/free defaults
  fallback_chain:
    - name: "openrouter/free"
      priority: 1
    - name: "openrouter/google/gemini-2.0-flash-exp:free"
      priority: 2
    - name: "openrouter/meta-llama/llama-3.3-70b-instruct:free"
      priority: 3
    - name: "openrouter/mistralai/mistral-7b-instruct:free"
      priority: 4

workers:
  max_workers: 5
  soft_timeout_sec: 600
  hard_timeout_sec: 1800
  heartbeat_stale_sec: 120
  queue_max_retries: 1

budget:
  total_budget_limit: 50.0
  evolution_budget_reserve: 5.0

hot_reload:
  check_interval_sec: 30
  vault_notification_enabled: true

evolution:
  enabled_by_default: true
  auto_promote_after_evolutions: 3

tools:
  enabled_by_default: ["*"]
  disabled: []

context:
  max_context_size: 128000
  auto_summarize_at_percent: 70

logging:
  suppress_progress: true
  log_level: "INFO"

memory:
  hybrid_enabled: true
  session_size: 50
  retrieve_top_k: 5

# Learning modules configuration
cerebrum:
  max_do_not_repeat: 100
  max_preferences: 200
  max_learnings: 500
  auto_cleanup_days: 30
  min_confidence: 0.6

buglog:
  max_entries: 1000
  auto_tag: true
  auto_cerebrum_sync: true

memory_extractor:
  min_confidence: 0.6
  max_tags: 5
  auto_extract_on_session_end: true

# Quality and safety modules
quality_gates:
  enabled_gates: ["compiles", "no_bare_except", "no_secrets", "functions_under_limit", "modules_under_limit", "imports_valid", "no_hallucinations"]
  auto_run_on_error: true
  categories: ["syntax", "security", "style", "quality"]

hallucination_guard:
  enabled: true
  confidence_threshold: 0.7
  false_positive_patterns: true
  auto_check: true

stuck_detector:
  enabled: true
  window_size: 10
  repeat_threshold: 3
  auto_reset_on_recovery: true

# Module connections
hooks:
  enabled: true
  config_path: "config/hooks.json"
  auto_register_defaults: true

anatomy:
  auto_scan_on_startup: false
  max_files: 100
  cache_hours: 24

query:
  include_stack_info: true
  include_health_check: true
  cache_seconds: 30

stack_detector:
  auto_detect: true
  confidence_threshold: 0.5

# Orchestration
tool_orchestrator:
  avoid_stuck_tools: true
  max_parallel: 8
  dependency_timeout_sec: 300

pipeline:
  enabled: false
  phases: ["diagnose", "plan", "execute", "verify", "synthesize"]
  auto_advance: true

# Ideation and debugging
ideation:
  max_ideas: 10
  min_confidence: 0.5
  auto_reflect: true

debug_analyzer:
  max_depth: 3
  debug_probability: 0.8
  auto_start_on_error: true